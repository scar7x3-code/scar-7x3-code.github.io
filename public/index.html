<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineDB — Movie & Series Catalog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────── -->
  <header class="header">
    <a href="/" class="logo">CINE<span>DB</span></a>

    <div class="search-wrapper">
      <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="Search movies, series..."
        autocomplete="off"
        spellcheck="false"
      />
      <button class="search-btn" id="searchBtn" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
      <ul class="suggestions" id="suggestions" hidden></ul>
    </div>
  </header>

  <!-- ── Main ───────────────────────────────────────────── -->
  <main class="main">

    <!-- Filters -->
    <div class="filters">
      <button class="filter-btn active" data-type="">All</button>
      <button class="filter-btn" data-type="movie">Movies</button>
      <button class="filter-btn" data-type="series">Series</button>
    </div>

    <!-- Status / heading -->
    <p class="catalog-heading" id="catalogHeading">Trending Now</p>

    <!-- Grid -->
    <div class="grid" id="grid"></div>

    <!-- Skeleton loader -->
    <div class="grid skeleton-grid" id="skeletonGrid">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>

    <!-- Empty state -->
    <div class="empty-state" id="emptyState" hidden>
      <span class="empty-icon">⌀</span>
      <p>No results found.</p>
      <small>Try a different title or keyword.</small>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination" hidden>
      <button class="page-btn" id="prevBtn" disabled>← Prev</button>
      <span class="page-info" id="pageInfo"></span>
      <button class="page-btn" id="nextBtn">Next →</button>
    </div>
  </main>

  <footer class="footer">
    <span>Powered by <a href="https://www.omdbapi.com" target="_blank">OMDb API</a></span>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
