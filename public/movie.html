<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineDB — Loading...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="detail-body">

  <!-- ── Header ─────────────────────────────────────────── -->
  <header class="header">
    <a href="/" class="logo">CINE<span>DB</span></a>
    <div class="search-wrapper">
      <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="Search movies, series..."
        autocomplete="off"
      />
      <button class="search-btn" id="searchBtn" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
      <ul class="suggestions" id="suggestions" hidden></ul>
    </div>
  </header>

  <!-- ── Detail ─────────────────────────────────────────── -->
  <main class="detail-main" id="detailMain">

    <!-- Loading -->
    <div class="detail-loading" id="detailLoading">
      <div class="spinner"></div>
    </div>

    <!-- Error -->
    <div class="detail-error" id="detailError" hidden>
      <p>Could not load this title.</p>
      <a href="/" class="btn-back">← Back to catalog</a>
    </div>

    <!-- Content (injected by JS) -->
    <div id="detailContent" hidden></div>

  </main>

  <footer class="footer">
    <span>Powered by <a href="https://www.omdbapi.com" target="_blank">OMDb API</a></span>
  </footer>

  <script src="js/movie.js"></script>
</body>
</html>
